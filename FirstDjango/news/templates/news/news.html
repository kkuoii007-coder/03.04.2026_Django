{% extends "base.html" %}

{% block title %}Новостная страница{% endblock %}

{% block content %}
<h1>Новостная страница</h1>

{% for new in news %}
	<div>
		<h2> {{ new.title }} </h2>
		<p> {{ new.short_description }} </p>
        <p> {{ new.name_author }} </p>
        <h3> {{ new.text }} </h3>
        <p> {{ new.pub_date }} </p>
	</div>
{% endfor %}

{% endblock %}
